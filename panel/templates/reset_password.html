<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="reset_password.title">重置密码 — HiveDeploy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --bg-default: #0d1117;
      --bg-card: #161b22;
      --border-default: #30363d;
      --blue: #58a6ff;
      --green: #3fb950;
      --amber: #d29922;
      --orange: #f78166;
      --red: #f85149;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --transition: 0.2s ease;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg-default);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(247,129,102,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(88,166,255,0.03) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 0%, rgba(247,129,102,0.03) 0%, transparent 50%);
    }

    @keyframes bgPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(247,129,102,0.05) 0%, transparent 70%);
      animation: bgPulse 6s ease-in-out infinite;
      pointer-events: none; z-index: 0;
    }

    @keyframes cardFloatIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(247,129,102,0.05), 0 0 0 1px var(--border-default); }
      50% { box-shadow: 0 0 35px rgba(247,129,102,0.12), 0 0 0 1px rgba(247,129,102,0.25); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes shakeX {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }

    @keyframes countdownPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      width: 100%; max-width: 440px;
      padding: 2.5rem;
      position: relative; z-index: 1;
      animation: cardFloatIn 0.5s ease-out, pulseGlow 6s ease-in-out 0.5s infinite;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: -1px; left: 20%; right: 20%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(247,129,102,0.5), transparent);
    }

    .brand-icon {
      display: inline-block;
      animation: iconFloat 3s ease-in-out infinite;
    }

    .brand {
      color: var(--orange);
      font-size: 1.6rem;
      font-weight: 700;
    }

    .brand-sub {
      color: var(--text-secondary);
      font-size: .9rem;
    }

    .form-control {
      background: var(--bg-default);
      border: 1px solid var(--border-default);
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.85rem;
      font-size: .9rem;
      transition: all var(--transition);
    }

    .form-control:focus {
      background: var(--bg-default);
      border-color: var(--orange);
      color: var(--text-primary);
      box-shadow: 0 0 0 3px rgba(247,129,102,.12), 0 0 15px rgba(247,129,102,0.06);
    }

    .form-control::placeholder { color: #484f58; }

    .form-label {
      color: var(--text-secondary);
      font-size: .85rem;
      font-weight: 500;
      margin-bottom: 0.35rem;
    }

    .hint {
      color: var(--text-secondary);
      font-size: .72rem;
    }

    .btn-primary {
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: var(--radius-sm);
      padding: 0.6rem 1rem;
      font-weight: 600;
      font-size: .9rem;
      transition: all var(--transition);
      position: relative; overflow: hidden;
    }

    .btn-primary:hover {
      background: #2ea043;
      border-color: #3fb950;
      box-shadow: 0 4px 12px rgba(63,185,80,0.25);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-outline-info {
      border-color: var(--blue);
      color: var(--blue);
      border-radius: var(--radius-sm);
      padding: 0.6rem 1rem;
      font-weight: 500;
      font-size: .85rem;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .btn-outline-info:hover {
      background: rgba(88,166,255,0.1);
      color: var(--blue);
      border-color: var(--blue);
    }

    .btn-outline-info:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .alert {
      border-radius: var(--radius-sm);
      font-size: .85rem;
      animation: fadeInUp 0.3s ease-out;
    }

    .alert-warning {
      background: rgba(210,153,34,0.1);
      border-color: rgba(210,153,34,0.25);
      color: var(--amber);
    }

    .alert-danger {
      background: rgba(248,81,73,0.1);
      border-color: rgba(248,81,73,0.25);
      color: var(--red);
    }

    .link-hover {
      color: var(--blue);
      text-decoration: none;
      transition: all var(--transition);
      border-bottom: 1px solid transparent;
    }
    .link-hover:hover {
      color: #79b8ff;
      border-bottom-color: rgba(88,166,255,0.4);
    }

    .input-icon {
      position: absolute;
      left: 0.75rem; top: 50%; transform: translateY(-50%);
      color: var(--text-secondary);
      z-index: 5;
      transition: color var(--transition);
      pointer-events: none;
    }

    .has-icon .form-control {
      padding-left: 2.5rem;
    }

    .has-icon:focus-within .input-icon {
      color: var(--orange);
    }

    .footer-link {
      animation: fadeInUp 0.5s ease-out 0.5s both;
    }

    .countdown-text {
      display: inline-block;
      font-variant-numeric: tabular-nums;
    }

    .countdown-text.active {
      animation: countdownPulse 1s ease-in-out infinite;
    }

    @media (max-width: 440px) {
      .auth-card {
        padding: 1.75rem;
        border-radius: var(--radius-md);
        margin: 1rem;
      }
      .brand { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="text-center mb-4" style="animation: fadeInUp 0.4s ease-out;">
    <div class="brand">
      <span class="brand-icon" style="display:inline-block;"><i class="bi bi-shield-lock me-2"></i></span><span data-i18n="reset_password.heading">重置密码</span>
    </div>
    <p class="brand-sub mt-1 mb-0" data-i18n="reset_password.subtitle">通过注册邮箱验证后重置密码</p>
  </div>

  {% if errors %}
  <div class="alert alert-danger py-2 mb-3">
    {% for e in errors %}
    <div><i class="bi bi-exclamation-triangle me-1"></i>{{ e }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% if not smtp_ready %}
  <div class="alert alert-warning py-2 mb-3">
    <i class="bi bi-exclamation-triangle me-1"></i><span data-i18n="reset_password.smtp_not_ready">邮件服务未配置，无法发送验证码。请联系管理员。</span>
  </div>
  {% endif %}

  <form method="post" action="/reset-password" style="animation: fadeInUp 0.4s ease-out 0.1s both;">
    <div class="mb-3 has-icon">
      <label class="form-label" data-i18n="reset_password.email_label">注册邮箱</label>
      <div class="position-relative">
        <span class="input-icon"><i class="bi bi-envelope"></i></span>
        <input type="email" class="form-control" name="email" id="emailInput" required autofocus
               value="{{ email or '' }}" data-i18n-placeholder="reset_password.email_placeholder" placeholder="输入注册时使用的邮箱">
      </div>
    </div>
    <div class="mb-3 has-icon">
      <label class="form-label" data-i18n="reset_password.code_label">邮箱验证码</label>
      <div class="input-group">
        <div class="position-relative flex-grow-1">
          <span class="input-icon"><i class="bi bi-shield-check"></i></span>
          <input type="text" class="form-control" name="code" required
                 data-i18n-placeholder="reset_password.code_placeholder" placeholder="6位数字验证码" maxlength="6" pattern="[0-9]{6}">
        </div>
        <button type="button" class="btn btn-outline-info ms-2" id="sendCodeBtn"
                onclick="sendCode()" {% if not smtp_ready %}disabled{% endif %}>
          <i class="bi bi-send me-1"></i><span data-i18n="reset_password.get_code_btn">获取验证码</span>
        </button>
      </div>
      <p class="hint mt-1"><i class="bi bi-clock me-1"></i><span data-i18n="reset_password.code_valid_hint">验证码 10 分钟内有效</span></p>
    </div>
    <div class="mb-3 has-icon">
      <label class="form-label"><span data-i18n="reset_password.new_password_label">新密码</span> <span class="hint" data-i18n="reset_password.password_hint">（至少 6 位）</span></label>
      <div class="position-relative">
        <span class="input-icon"><i class="bi bi-lock"></i></span>
        <input type="password" class="form-control" name="new_password" required
               data-i18n-placeholder="reset_password.new_password_placeholder" placeholder="设置新密码" minlength="6">
      </div>
    </div>
    <div class="mb-4 has-icon">
      <label class="form-label" data-i18n="reset_password.confirm_password_label">确认新密码</label>
      <div class="position-relative">
        <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
        <input type="password" class="form-control" name="new_password2" required
               data-i18n-placeholder="reset_password.confirm_password_placeholder" placeholder="再次输入新密码">
      </div>
    </div>
    <button type="submit" class="btn btn-primary w-100">
      <i class="bi bi-check-circle me-1"></i><span data-i18n="reset_password.reset_btn">重置密码</span>
    </button>
  </form>

  <p class="text-center mb-0 mt-3 footer-link">
    <a href="/login" class="link-hover" style="font-size:.875rem;">
      <i class="bi bi-box-arrow-in-right me-1"></i><span data-i18n="reset_password.back_to_login">返回登录</span>
    </a>
  </p>
</div>

<script>
let countdownTimer = null;
let countdownSeconds = 0;

function __i(key, fallback) {
  if (window.__i18n) return window.__i18n(key, fallback);
  return fallback;
}

async function sendCode() {
  const emailInput = document.getElementById('emailInput');
  const email = emailInput.value.trim();
  if (!email) {
    emailInput.style.animation = 'shakeX 0.5s ease';
    setTimeout(() => emailInput.style.animation = '', 500);
    emailInput.focus();
    return;
  }
  const btn = document.getElementById('sendCodeBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>' + __i('reset_password.sending', '发送中...');

  try {
    const fd = new FormData();
    fd.append('email', email);
    fd.append('purpose', 'reset_password');
    const r = await fetch('/api/email/send-code', { method: 'POST', body: fd });
    const d = await r.json();
    if (d.ok) {
      btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>' + __i('reset_password.sent', '已发送');
      btn.classList.remove('btn-outline-info');
      btn.classList.add('btn-outline-success');
      startCountdown(60);
    } else {
      btn.innerHTML = '<i class="bi bi-send me-1"></i>' + __i('reset_password.get_code_btn', '获取验证码');
      btn.disabled = false;
      alert(d.error || __i('reset_password.send_failed', '发送失败，请稍后重试'));
    }
  } catch(e) {
    btn.innerHTML = '<i class="bi bi-send me-1"></i>' + __i('reset_password.get_code_btn', '获取验证码');
    btn.disabled = false;
    alert(__i('reset_password.network_error', '网络错误，请稍后重试'));
  }
}

function startCountdown(seconds) {
  countdownSeconds = seconds;
  const btn = document.getElementById('sendCodeBtn');
  updateCountdownDisplay();

  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownSeconds--;
    if (countdownSeconds <= 0) {
      clearInterval(countdownTimer);
      countdownTimer = null;
      btn.innerHTML = '<i class="bi bi-send me-1"></i>' + __i('reset_password.resend_btn', '重新获取');
      btn.disabled = false;
      btn.classList.remove('btn-outline-success');
      btn.classList.add('btn-outline-info');
    } else {
      updateCountdownDisplay();
    }
  }, 1000);
}

function updateCountdownDisplay() {
  const btn = document.getElementById('sendCodeBtn');
  btn.innerHTML = '<span class="countdown-text active">' + countdownSeconds + 's</span> ' + __i('reset_password.retry_after', '后重发');
}
</script>
</body>
</html>
